<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Piply</title>
    <meta name="robots" content="noindex" />
</head>

<body>
    <div style="font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; max-width: 520px; padding: 24px;">
        <h1 style="font-size: 24px; margin: 0 0 8px;">Opening Piply...</h1>
        <p style="margin: 0 0 20px; color: #444;">
            If the store does not open automatically, use one of the links below.
        </p>
        <p style="display: flex; flex-wrap: wrap; gap: 12px; margin: 0;">
            <a id="ios-link" href="itms-apps://itunes.apple.com/app/id6759636847">App Store</a>
            <a id="android-link" href="market://details?id=com.snapshotzdev.piply">Google Play</a>
        </p>
    </div>

    <script>
        const IOS_URL = "itms-apps://itunes.apple.com/app/id6759636847";
        const ANDROID_URL = "market://details?id=com.snapshotzdev.piply";
        const FALLBACK_URL = "https://snapshotzdev.com/piply/";

        const ua = navigator.userAgent || "";
        const platform = navigator.userAgentData && navigator.userAgentData.platform
            ? navigator.userAgentData.platform
            : navigator.platform || "";

        const isAndroid = /android/i.test(ua);
        const isIOS = /iphone|ipad|ipod/i.test(ua);
        const isIPadOS = /mac/i.test(platform) && navigator.maxTouchPoints > 1;

        const dest = isAndroid ? ANDROID_URL : (isIOS || isIPadOS ? IOS_URL : FALLBACK_URL);

        window.location.href = dest;
    </script>
</body>

</html>
